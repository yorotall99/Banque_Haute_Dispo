<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent de Terrain | ISI Bank</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">
    <div class="nav-isi text-center py-4 mb-5 shadow">
        <h5 class="text-white fw-bold mb-0">ISI MOBILE AGENT</h5>
    </div>

    <div class="container px-4">
        <div class="glass-panel p-4 mb-4">
            <h5 class="fw-bold mb-4">Enrôlement Client Direct</h5>
            <form action="/api/enrolment" method="POST">
                <div class="mb-3">
                    <label class="small fw-bold text-muted">Nom Complet</label>
                    <input type="text" name="fullname" class="form-control form-control-lg border-0 bg-soft" required>
                </div>
                <div class="mb-3">
                    <label class="small fw-bold text-muted">Contact Mobile</label>
                    <input type="tel" name="phone" class="form-control form-control-lg border-0 bg-soft" required>
                </div>
                <div class="mb-4">
                    <label class="small fw-bold text-muted">Dépôt Cash Initial (XOF)</label>
                    <input type="number" name="deposit" class="form-control form-control-lg border-0 bg-soft" value="0">
                </div>
                <button type="submit" class="btn-isi w-100 py-3">ACTIVER LE COMPTE</button>
            </form>
        </div>
    </div>
</body>
</html>
