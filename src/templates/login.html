<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - ISI Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        .isi-logo {
            font-size: 3rem;
            color: #1a237e;
            margin-bottom: 1rem;
        }
        .btn-isi {
            background: #1a237e;
            color: white;
            transition: 0.3s;
        }
        .btn-isi:hover {
            background: #283593;
            color: white;
            transform: translateY(-2px);
        }
        .form-control:focus {
            border-color: #1a237e;
            box-shadow: 0 0 0 0.25rem rgba(26, 35, 126, 0.1);
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <div class="isi-logo">
        <i class="bi bi-shield-lock-fill"></i>
    </div>
    <h3 class="fw-bold mb-1">ISI BANK</h3>
    <p class="text-muted mb-4">Système de Gestion Bancaire (DSIA)</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-danger py-2 small" role="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('login') }}" method="POST">
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Identifiant</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Nom d'utilisateur" required>
            </div>
        </div>

        <div class="mb-3 text-start">
            <label class="form-label small fw-bold">Mot de passe</label>
            <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-key"></i></span>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
        </div>

        <div class="mb-4 text-start">
            <label class="form-label small fw-bold">Votre rôle</label>
            <select name="role" class="form-select">
                <option value="employer">Personnel ISI Bank</option>
                <option value="client">Espace Client</option>
            </select>
        </div>

        <button type="submit" class="btn btn-isi w-100 py-2 fw-bold">Se connecter</button>
    </form>

    <div class="mt-4">
        <small class="text-muted">© 2026 Institut Supérieur d'Informatique</small>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
